<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lusitânia Astral - Centro de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="bg-gray-800 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-400">Lusitânia Astral</h1>
            <ul class="flex space-x-4">
                <li><a href="index.html" class="hover:text-blue-300">Montra</a></li>
                <li><a href="admin.html" class="text-blue-400 font-bold border-b-2 border-blue-400">Centro de Comando</a></li>
            </ul>
        </div>
    </nav>

    <section class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-semibold">Gestão de Inventário Galáctico</h2>
            <a href="formulario.html" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded font-bold shadow transition">+ Novo Registo</a>
        </div>

        <div class="overflow-x-auto bg-gray-800 rounded-lg shadow">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-700 text-gray-300 uppercase text-sm">
                        <th class="p-4 border-b border-gray-600">ID</th>
                        <th class="p-4 border-b border-gray-600">Nome</th>
                        <th class="p-4 border-b border-gray-600">Vendedor</th>
                        <th class="p-4 border-b border-gray-600">Preço (BTC)</th>
                        <th class="p-4 border-b border-gray-600">Status</th>
                        <th class="p-4 border-b border-gray-600 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-planetas">
                    
                    <tr class="hover:bg-gray-700 transition">
                        <td class="p-4 border-b border-gray-700 text-gray-400 text-sm">123e4567...</td>
                        <td class="p-4 border-b border-gray-700 font-bold">Marte Secundus</td>
                        <td class="p-4 border-b border-gray-700">Explorador Vasco</td>
                        <td class="p-4 border-b border-gray-700 text-yellow-400 font-mono">2.5</td>
                        <td class="p-4 border-b border-gray-700">
                            <span class="px-2 py-1 bg-green-900 text-green-300 text-xs font-bold rounded-full border border-green-700">Disponível</span>
                        </td>
                        <td class="p-4 border-b border-gray-700 text-center space-x-2">
                            <button class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded text-sm transition">Editar</button>
                            <button class="bg-red-600 hover:bg-red-500 text-white px-3 py-1 rounded text-sm transition">Eliminar</button>
                        </td>
                    </tr>

                    <tr class="hover:bg-gray-700 transition opacity-75">
                        <td class="p-4 border-b border-gray-700 text-gray-400 text-sm">987a6543...</td>
                        <td class="p-4 border-b border-gray-700 font-bold text-gray-400">Nova Sintra</td>
                        <td class="p-4 border-b border-gray-700">Império Luso</td>
                        <td class="p-4 border-b border-gray-700 text-yellow-400 font-mono">15.0</td>
                        <td class="p-4 border-b border-gray-700">
                            <span class="px-2 py-1 bg-red-900 text-red-300 text-xs font-bold rounded-full border border-red-700">Vendido</span>
                        </td>
                        <td class="p-4 border-b border-gray-700 text-center space-x-2">
                            <button class="bg-blue-800 text-gray-400 px-3 py-1 rounded text-sm cursor-not-allowed" disabled>Editar</button>
                            <button class="bg-red-800 text-gray-400 px-3 py-1 rounded text-sm cursor-not-allowed" disabled>Eliminar</button>
                        </td>
                    </tr>

                </tbody>
            </table>
        </div>
    </section>

</body>
</html>
