<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Comando - Gestão Galáctica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-space-dark text-white font-sans min-h-screen relative">
    <div id="stars-container" class="fixed inset-0 z-[-1] pointer-events-none bg-black"></div>
    <nav class="glass-nav sticky top-0 z-50 p-4 mb-8 border-b border-gray-800">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-2xl font-bold text-cyan-400 tracking-wider hover:text-cyan-300 transition">
                <i class="fa-solid fa-meteor"></i>
                LUSITANIA ASTRAL
            </a>
            <div class="flex gap-6">
                <a href="index.html" class="text-gray-400 hover:text-white transition">Montra Galáctica</a>
                <a href="admin.html" class="text-cyan-400 border-b-2 border-cyan-400 pb-1">Centro de Comando</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto px-4 pb-12">
        <header class="mb-10 text-center">
            <h1 class="text-4xl md:text-5xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                Centro de Comando
            </h1>
            <p class="text-gray-400 text-lg">Gerência de Arquivos Planetários</p>
        </header>
        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <section class="xl:col-span-1">
                <div class="glass-card p-6 rounded-2xl border border-gray-800 sticky top-24">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2" id="formTitle">
                        <i class="fa-solid fa-satellite text-cyan-400"></i> Registar Nova Descoberta
                    </h2>
                    <form id="planetForm" class="space-y-4">
                        <input type="hidden" id="planetId">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Nome do Planeta *</label>
                            <input type="text" id="nome" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 transition-colors">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Vendedor</label>
                                <input type="text" id="vendedor" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Status</label>
                                <select id="status" class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 cursor-pointer">
                                    <option value="Disponivel">Disponível</option>
                                    <option value="Vendido">Vendido</option>
                                    <option value="Em Negociação">Em Negociação</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Preço (BTC) *</label>
                                <input type="number" id="precoBTC" step="0.01" min="0" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-400 mb-1">Dimensões</label>
                                <input type="text" id="dimensoes" placeholder="Ex: 12,000 km" class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 transition-colors">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">URL da Imagem</label>
                            <input type="url" id="imagem" placeholder="https://..." class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Recursos (Ctrl/Cmd + Clique para múltiplos)</label>
                            <select id="recursos" multiple class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 cursor-pointer h-32">
                                <optgroup label="Fauna">
                                    <option value="terrestre">Terrestre</option>
                                    <option value="aviario">Aviário</option>
                                    <option value="aquatico">Aquático</option>
                                    <option value="marisco">Marisco</option>
                                    <option value="insetos">Insetos</option>
                                </optgroup>
                                <optgroup label="Flora">
                                    <option value="madeireira">Madeireira</option>
                                    <option value="ornamental">Ornamental</option>
                                </optgroup>
                                <optgroup label="Geologia">
                                    <option value="minerio">Minério</option>
                                    <option value="gas">Gás</option>
                                    <option value="liquido">Líquido</option>
                                </optgroup>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1">Descrição</label>
                            <textarea id="descricao" rows="3" required class="w-full bg-black/50 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-400 transition-colors"></textarea>
                        </div>
                        <div class="flex gap-4 pt-4">
                            <button type="submit" id="submitBtn" class="flex-1 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all transform hover:scale-[1.02]">
                                Guardar Descoberta
                            </button>
                            <button type="button" id="cancelEditBtn" class="hidden px-4 py-3 bg-gray-800 hover:bg-gray-700 text-white font-bold rounded-lg transition-all border border-gray-600">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </section>
            <section class="xl:col-span-2 overflow-x-auto">
                <div class="glass-card rounded-2xl border border-gray-800 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-900/80 border-b border-gray-800">
                                <th class="p-4 font-semibold text-gray-400">ID</th>
                                <th class="p-4 font-semibold text-gray-400">Nome</th>
                                <th class="p-4 font-semibold text-gray-400">Vendedor</th>
                                <th class="p-4 font-semibold text-gray-400">Preço</th>
                                <th class="p-4 font-semibold text-gray-400">Status</th>
                                <th class="p-4 font-semibold text-gray-400 text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="planetsTableBody" class="divide-y divide-gray-800/50 block md:table-row-group">
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <footer class="border-t border-gray-800 bg-black/50 backdrop-blur-sm mt-auto py-8">
        <div class="container mx-auto px-4 text-center text-gray-400">
            <p>&copy; <span id="currentYear"></span> Lusitania Astral. The Galaxy is Yours.</p>
        </div>
    </footer>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
